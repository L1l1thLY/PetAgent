services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: petagent
      POSTGRES_PASSWORD: petagent
      POSTGRES_DB: petagent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petagent -d petagent"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://petagent:petagent@db:5432/petagent
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - petagent-data:/petagent
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  petagent-data:
