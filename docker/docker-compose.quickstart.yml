services:
  petagent:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${PETAGENT_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PETAGENT_HOME: "/petagent"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PETAGENT_DEPLOYMENT_MODE: "authenticated"
      PETAGENT_DEPLOYMENT_EXPOSURE: "private"
      PETAGENT_PUBLIC_URL: "${PETAGENT_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${PETAGENT_DATA_DIR:-../data/docker-petagent}:/petagent"
