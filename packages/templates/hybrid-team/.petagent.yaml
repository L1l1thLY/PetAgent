schema: petagent/v1
agents:
  coordinator-1:
    adapter:
      type: petagent
      config:
        roleType: coordinator
    budget:
      monthlyUsd: 15
  planner-1:
    adapter:
      type: petagent
      config:
        roleType: worker/planner
    budget:
      monthlyUsd: 25
  reviewer-1:
    adapter:
      type: petagent
      config:
        roleType: worker/reviewer
    budget:
      monthlyUsd: 30
  therapist:
    adapter:
      type: petagent
      config:
        roleType: psychologist
    budget:
      monthlyUsd: 10
  claudecode-executor-1:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        selfReviewsImplementation: true
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: optional
        CLAUDE_BIN:
          kind: plain
          requirement: optional
          default: claude
    budget:
      monthlyUsd: 60
  claudecode-executor-2:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        selfReviewsImplementation: true
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: optional
        CLAUDE_BIN:
          kind: plain
          requirement: optional
          default: claude
    budget:
      monthlyUsd: 60
